# Waypaper Engine Configuration
# This file is shared between the daemon and the Electron app

[app]
# Application-specific settings
kill_daemon_on_exit = true
notifications = true
start_minimized = false
minimize_instead_of_close = true
random_image_monitor = "individual"  # "clone" | "extend" | "individual"
show_monitor_modal_on_start = true
startup_intro = true
images_per_page = 20
theme = "kolision-raw"
font_preset = "bundled"
font_family_body = ""
font_family_display = ""
font_family_mono = ""
sidebar_collapsed = false
sort_by = "name"  # "name" | "date" | "size"
sort_order = "asc"  # "asc" | "desc"
image_history_limit = 50  # Maximum number of images to keep in history

[daemon]
# Daemon-specific settings
database_path = "~/.config/waypaper-engine/data"
images_dir = "~/.waypaper-engine/images"
thumbnails_dir = "~/.waypaper-engine/data/cache/thumbnails"
monitors_state_file = "~/.cache/waypaper-engine/monitors.json"
socket_path = "/tmp/waypaper-engine.sock"
log_level = "info"  # "debug" | "info" | "warn" | "error"
log_file = "~/.config/waypaper-engine/daemon.log"
log_max_size = 10  # MB
log_max_age = 7    # days
log_max_backups = 3

# Electron settings are handled by the app section

[backend]
# Backend configuration
type = "awww"  # "awww" | "hyprpaper" | "feh" | "wayland-utauri"

[backend.awww]
# awww-specific configuration
transition_type = "simple"  # "simple" | "wipe" | "grow" | "outer" | "wave"
transition_step = 90
transition_duration = 200
transition_angle = 45
transition_pos = "center"  # "center" | "top" | "bottom" | "left" | "right"
transition_bezier = "0.4,0.0,0.2,1"
transition_wave = "0,0,0,0"

[backend.wayland-utauri]
# wayland-utauri first-party backend configuration (must match backend.type name; legacy [backend.waylandutauri] is still read)
socket_path = ""
expected_service = "wayland-utauri"
expected_api_version = "0"
connect_timeout_ms = 500
request_timeout_ms = 1500
transition = "none"
duration_ms = 300
allow_network_wallpapers = false
# Hyprland/Sway: workspace follow → POST /wallpaper/parallax-move (auto | off | hyprland | sway; requires parallax_enabled in app)
parallax_compositor_driver = "auto"
# parallax_workspace_chunk_size = 10      # ring size for mapping workspace id deltas to parallax left/right
# parallax_direction = "horizontal"        # horizontal | vertical — default workspace parallax axis (waypaper.json can override)
# parallax_reset_ms = 400                  # disable / snap-back transition duration (sent with POST /wallpaper/parallax)

[monitors]
# Monitor configuration
selected_monitors = []
image_set_type = "individual"  # "individual" | "extend" | "clone"