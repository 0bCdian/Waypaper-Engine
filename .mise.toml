[tools]
node = "22"
go = "1.26"
python = "3.12"

[tasks.deps]
description = "Install Node dependencies"
run = "npm ci"

[tasks.daemon]
description = "Build Go daemon binary"
run = "npm run build:daemon"

[tasks.build]
description = "Build app artifacts"
run = "npm run build"

[tasks."format-check"]
description = "Check formatting with Oxfmt"
run = "npm run format:check"

[tasks."lint-check"]
description = "Run frontend lint checks"
run = "npm run lint:check"

[tasks."gofmt-check"]
description = "Check Go formatting"
run = "npm run gofmt:check"

[tasks.typecheck]
description = "Run TypeScript typecheck"
run = "npx tsc --noEmit"

[tasks.test]
description = "Run frontend unit tests"
run = "npm run test"

[tasks."test-daemon"]
description = "Run daemon unit tests"
run = "npm run test:daemon:unit"

[tasks."precommit-all"]
description = "Run all pre-commit hooks"
run = "pre-commit run --all-files"

[tasks.ci]
description = "Run local CI-equivalent checks"
run = "npm run ci:check"
