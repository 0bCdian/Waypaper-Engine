<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <base href=".">
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Kerr Newman Black Hole</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    #vanta-bg { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="vanta-bg"></div>
  <script src="p5.min.js"></script>
  <script src="vanta.trunk.min.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      VANTA.TRUNK({
        el: "#vanta-bg",
        p5: p5,
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.00,
        minWidth: 200.00,
        scale: 1.00,
        scaleMobile: 1.00,
        color: 0x505050,
        spacing: 10.00,
        chaos: 10.00
      })
    })
  </script>
</body>
</html>
